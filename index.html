<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>TechStore</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Catálogo de Productos</h1>

    <div class="filtros">
  <button class="btn activo" onclick="filtrar('todos', this)">Todos</button>
  <button class="btn" onclick="filtrar('celulares', this)">Celulares</button>
  <button class="btn" onclick="filtrar('laptops', this)">Laptops</button>
  <button class="btn" onclick="filtrar('accesorios', this)">Accesorios</button>
</div>

<div class="contenedor">
<!-- Celulares -->
<div class="producto celulares">
  <img src="img/cel.png" alt="">
  <h3>iPhone</h3>
</div>

<div class="producto celulares">
  <img src="https://via.placeholder.com/200x120" alt="">
  <h3>Samsung Galaxy</h3>
</div>

<!-- Laptops -->
<div class="producto laptops">
  <img src="https://via.placeholder.com/200x120" alt="">
  <h3>MacBook</h3>
</div>

<div class="producto laptops">
  <img src="https://via.placeholder.com/200x120" alt="">
  <h3>HP Laptop</h3>
</div>

<!-- Accesorios -->
<div class="producto accesorios">
  <img src="https://via.placeholder.com/200x120" alt="">
  <h3>Audífonos</h3>
</div>

<div class="producto accesorios">
  <img src="https://via.placeholder.com/200x120" alt="">
  <h3>Cargador</h3>
</div>
</div>

<script src="category.js"></script>

</body>
</html>
